# Settings for the sanity check.
# Change these values and re-run - you do not need to edit any code.

# Which model to load from the Hugging Face Hub.
# This is a TINY test version of Mixtral (only a few MB) so it runs fast on a laptop.
# Later we swap just this one line for the real "mistralai/Mixtral-8x7B-v0.1".
model_id: hf-internal-testing/Mixtral-tiny

# The text we feed into the model for the test.
prompt: "The capital of France is"

# Fixes all random number generators so every run gives the same result
# (reproducibility - important for trustworthy experiments).
seed: 0
