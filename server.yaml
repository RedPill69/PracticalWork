# SERVER config: the real Mixtral-8x7B in 4-bit on a CUDA GPU. One 48 GB card
# (e.g. RTX 6000 Ada) is enough. This is the config for the actual Stage-1
# benchmark run. On a fresh pod, run `bash runpod_setup.sh` first (installs the
# pinned packages and downloads the model), then:
#
#   python run_eval.py --config server.yaml --limit 2      # smoke run first
#   python run_eval.py --config server.yaml                # per-member sweep
#   python analyze.py  --config server.yaml                # final answers

seed: 0

prompt: "The capital of France is"

model:
  model_id: mistralai/Mixtral-8x7B-v0.1
  dtype: bfloat16
  quantization: 4bit      # nf4 + double quant; ~24GB, fits one 48GB card
  device: auto            # when quantized, the model is pinned to GPU 0 (see load_model)

eval:
  # Knowledge (MMLU), science MCQ (ARC), commonsense (HellaSwag).
  tasks: [mmlu, arc_challenge, hellaswag]
  # Applied to ALL tasks. 5 is a common choice; set per-task by running
  # separate configs if you want MMLU-5 / others-0. Relative member loss does
  # not depend on the exact shot count.
  num_fewshot: 5
  # Subset size per task, matched across all members. Start small to time one
  # pass, then scale up (e.g. 1000, or a fraction like 0.5 for half the set).
  limit: 1000
  batch_size: 4
  output_dir: results

chat:
  max_new_tokens: 200
  temperature: 0.8
  do_sample: true
