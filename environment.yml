# Conda environment for the Practical Work project.
#
# Create it once with:   conda env create -f environment.yml
# Update it later with:  conda env update -f environment.yml --prune
#
# Keep this file in sync whenever we add a new dependency, so the env can be
# rebuilt the same way on any machine (laptop, university server, ...).

name: practical_work

channels:
  - conda-forge

dependencies:
  - python=3.11
  - pip
  # Everything below is installed via pip (simple, always recent wheels):
  - pip:
      - torch          # PyTorch - the framework that actually runs the model
      # Pinned to the last 4.x: transformers 5.x stores Mixtral's experts as a
      # fused 3D parameter, which bitsandbytes cannot 4-bit quantize (only
      # nn.Linear). 4.x keeps the experts as separate nn.Linear, so the 4-bit
      # load works on one GPU, and routing.py intervenes on that 4.x structure.
      - transformers==4.57.6   # Hugging Face - gives us the Mixtral model + tokenizer
      - sentencepiece  # Tokenizer backend the Mixtral tokenizer needs
      - accelerate     # Helper that places the model on CPU/GPU correctly
      - bitsandbytes   # 4-bit quantization for the real Mixtral (GPU only)
      - lm-eval        # EleutherAI eval harness - the benchmark accuracy
      - datasets       # benchmark data (pulled in by lm-eval too)
      - pyyaml         # Lets us read the YAML config files
      - jupyter        # So we can run the notebook
      - ipykernel      # Connects this conda env to Jupyter as a kernel
